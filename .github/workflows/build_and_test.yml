name: Build and test

on:
  workflow_dispatch:
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linux:
    name: Linux ${{ matrix.target.label }} (${{ matrix.build_mode }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        build_mode: [default, release]
        target:
          - label: host
            command: bazel test //:host
            extra_flags: ""
          - label: wasm
            command: bazel test //:wasm-all
            extra_flags: --config=wasm
          - label: android
            command: bazel build //:android
            extra_flags: --config=android
        exclude:
          - build_mode: release
            target:
              label: wasm
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Bazel
        uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          repository-cache: true
          bazelrc: |
            common --remote_header=x-buildbuddy-api-key=${{ secrets.BUILDBUDDY_API_KEY }}

      - name: Set release flag
        id: flags
        run: |
          if [ "${{ matrix.build_mode }}" = "release" ]; then
            echo "release_flag=--config=release" >> "$GITHUB_OUTPUT"
          else
            echo "release_flag=" >> "$GITHUB_OUTPUT"
          fi

      - name: ${{ matrix.target.label }}
        run: >
          ${{ matrix.target.command }}
          ${{ matrix.target.extra_flags }}
          --config=ci
          ${{ steps.flags.outputs.release_flag }}

  macos:
    name: macOS host (${{ matrix.build_mode }})
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        build_mode: [default, release]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Bazel
        uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          repository-cache: true
          bazelrc: |
            common --remote_header=x-buildbuddy-api-key=${{ secrets.BUILDBUDDY_API_KEY }}

      - name: Set release flag
        id: flags
        run: |
          if [ "${{ matrix.build_mode }}" = "release" ]; then
            echo "release_flag=--config=release" >> "$GITHUB_OUTPUT"
          else
            echo "release_flag=" >> "$GITHUB_OUTPUT"
          fi

      - name: host
        run: >
          bazel test //:host
          --config=ci
          ${{ steps.flags.outputs.release_flag }}
